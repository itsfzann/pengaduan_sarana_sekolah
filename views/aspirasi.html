<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manajemen Aspirasi - UKK Siswa</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="container" id="contentArea">
      <h2>Master Data Aspirasi</h2>

      <form
        id="formAspirasi"
        data-table="tb_aspirasi"
        onsubmit="submitData(event, 'tb_aspirasi', 'tabelAspirasi')"
      >
        <input type="hidden" name="id_aspirasi" />

        <div class="form-group">
          <label>ID Pelaporan</label>
          <input type="number" name="id_pelaporan" required />
        </div>

        <div class="form-group">
          <label>Status</label>
          <select name="status" required>
            <option value="Menunggu">Menunggu</option>
            <option value="Proses">Proses</option>
            <option value="Selesai">Selesai</option>
          </select>
        </div>

        <div class="form-group">
          <label>ID Kategori</label>
          <input type="number" name="id_kategori" />
        </div>

        <div class="form-group">
          <label>Feedback</label>
          <textarea
            name="feedback"
            placeholder="Masukkan feedback atau catatan..."
            rows="4"
          ></textarea>
        </div>

        <div class="full-width">
          <button type="submit" class="btn btn-save">Simpan Data</button>
          <button
            type="reset"
            class="btn"
            style="background: #95a5a6; color: white"
          >
            Reset
          </button>
        </div>
      </form>

      <div class="search-box">
        <input
          type="text"
          placeholder="Cari aspirasi..."
          onkeyup="muatTabel('tb_aspirasi', 'tabelAspirasi', this.value)"
        />
      </div>

      <div class="table-responsive">
        <table id="tabelAdmin" data-source="tb_aspirasi">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <script src="../js/script.js"></script>
  </body>
</html>
