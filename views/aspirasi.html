<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Input Aspirasi - Universal System</title>

    <link rel="stylesheet" href="../css/layout.css?v=2" />
    <link rel="stylesheet" href="../css/aspirasi.css?v=2" />
  </head>

  <body>
    <!-- HEADER -->
    <header class="app-header">
      <div class="app-header-inner">
        <div class="brand">
          <div class="mark" aria-hidden="true">💡</div>

          <div class="title">
            <strong>Universal System</strong>
            <span>Manajemen Data</span>
          </div>
        </div>

        <!-- NAVIGATION -->
        <nav class="nav" aria-label="Navigasi Utama">
          <a href="admin.html">Admin</a>
          <a href="siswa.html">Siswa</a>
          <a href="kategori.html">Kategori</a>
          <a href="aspirasi.html">Aspirasi</a>

          <button class="app-btn-ghost" type="button" onclick="logout()">
            Logout
          </button>
        </nav>
      </div>
    </header>

    <!-- CONTENT -->
    <div class="app-container" id="contentArea">
      <h2>Input Data Aspirasi</h2>

      <!-- FORM -->
      <form
        id="formAspirasi"
        data-table="tb_input_aspirasi"
        onsubmit="submitData(event, 'tb_input_aspirasi', 'tabelAspirasi')"
      >
        <div class="form-group">
          <label>ID Pelaporan</label>
          <input type="number" name="id_pelaporan" required />
        </div>

        <div class="form-group">
          <label>NIS</label>
          <input type="number" name="nis" required />
        </div>

        <div class="form-group">
          <label>ID Kategori</label>
          <input type="number" name="id_kategori" required />
        </div>

        <div class="form-group">
          <label>Lokasi</label>
          <input type="text" name="lokasi" required />
        </div>

        <div class="form-group full-width">
          <label>Keterangan</label>

          <textarea
            name="ket"
            rows="4"
            placeholder="Masukkan keterangan aspirasi..."
            required
          ></textarea>
        </div>

        <!-- ACTION BUTTON -->
        <div class="full-width">
          <button type="submit" class="app-btn btn-save">Simpan Data</button>

          <button
            type="reset"
            class="app-btn"
            style="background: #95a5a6; color: white"
          >
            Reset
          </button>
        </div>
      </form>

      <!-- SEARCH -->
      <div class="search-box">
        <input
          type="text"
          placeholder="Cari data aspirasi..."
          onkeyup="muatTabel('tb_input_aspirasi', 'tabelAspirasi', this.value)"
        />
      </div>

      <!-- TABLE -->
      <div class="table-responsive">
        <table id="tabelAspirasi" data-source="tb_input_aspirasi">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- SCRIPT -->
    <script src="script.js"></script>
  </body>
</html>
