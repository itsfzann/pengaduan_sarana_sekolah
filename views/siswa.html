<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manajemen Siswa - UKK Siswa</title>
    <link rel="stylesheet" href="../css/siswa.css" />
  </head>
  <body>
    <div class="container" id="contentArea">
      <h2>Master Data Siswa</h2>

      <form
        id="formSiswa"
        data-table="tb_siswa"
        onsubmit="submitData(event, 'tb_siswa', 'tabelSiswa')"
      >
        <input type="hidden" name="NIS" />

        <div class="form-group">
          <label>NIS (Nomor Induk Siswa)</label>
          <input type="number" name="NIS" required />
        </div>

        <div class="form-group">
          <label>Nama Siswa</label>
          <input type="text" name="nama_siswa" required />
        </div>

        <div class="form-group">
          <label>Kelas</label>
          <input
            type="text"
            name="kelas"
            placeholder="Contoh : XI RPL B"
            required
          />
        </div>

        <div class="full-width">
          <button type="submit" class="btn btn-save">Simpan Data</button>
          <button
            type="reset"
            class="btn"
            style="background: #95a5a6; color: white"
          >
            Reset
          </button>
        </div>
      </form>

      <div class="search-box">
        <input
          type="text"
          placeholder="Cari siswa..."
          onkeyup="muatTabel('tb_siswa', 'tabelSiswa', this.value)"
        />
      </div>

      <div class="table-responsive">
        <table id="tabelSiswa" data-source="tb_siswa">
          </tbody>
        </table>
      </div>
    </div>

    <script src="../js/script.js"></script>
  </body>
</html>
