<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Manajemen Admin - Universal System</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

<div class="container" id="contentArea">
    <h2>Master Data Admin</h2>

    <form id="formAdmin" data-table="tb_admin" onsubmit="submitData(event, 'tb_admin', 'tabelAdmin')">
        
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        
        <div class="full-width">
            <button type="submit" class="btn btn-save">Simpan Data</button>
            <button type="reset" class="btn" style="background:#95a5a6; color:white;">Reset</button>
        </div>
    </form>

    <div class="search-box">
        <input type="text" placeholder="Cari admin..." onkeyup="muatTabel('tb_admin', 'tabelAdmin', this.value)">
    </div>

    <div class="table-responsive">
        <table id="tabelAdmin" data-source="tb_admin">
            <thead></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
