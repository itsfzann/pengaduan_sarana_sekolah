<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Kategori - Universal System</title>

    <link rel="stylesheet" href="../css/layout.css?v=2" />
    <link rel="stylesheet" href="../css/kategori.css?v=2" />
  </head>

  <body>
    <!-- HEADER -->
    <header class="app-header">
      <div class="app-header-inner">
        <div class="brand">
          <div class="mark" aria-hidden="true">📚</div>

          <div class="title">
            <strong>Universal System</strong>
            <span>Manajemen Data</span>
          </div>
        </div>

        <!-- NAVIGATION -->
        <nav class="nav" aria-label="Navigasi Utama">
          <a href="admin.html">Admin</a>
          <a href="siswa.html">Siswa</a>
          <a href="kategori.html">Kategori</a>
          <a href="aspirasi.html">Aspirasi</a>

          <button class="app-btn-ghost" type="button" onclick="logout()">
            Logout
          </button>
        </nav>
      </div>
    </header>

    <!-- CONTENT -->
    <div class="app-container" id="contentArea">
      <h2>Master Data Kategori</h2>

      <!-- FORM -->
      <form
        id="formKategori"
        data-table="tb_kategori"
        onsubmit="submitData(event, 'tb_kategori', 'tabelKategori')"
      >
        <div class="form-group">
          <label>ID Kategori</label>
          <input type="number" name="id_kategori" required />
        </div>

        <div class="form-group">
          <label>Keterangan Kategori</label>

          <input
            type="text"
            name="ket_kategori"
            placeholder="Masukkan kategori..."
            required
          />
        </div>

        <!-- BUTTON -->
        <div class="full-width">
          <button type="submit" class="app-btn btn-save">Simpan Data</button>

          <button
            type="reset"
            class="app-btn"
            style="background: #95a5a6; color: white"
          >
            Reset
          </button>
        </div>
      </form>

      <!-- SEARCH -->
      <div class="search-box">
        <input
          type="text"
          placeholder="Cari kategori..."
          onkeyup="muatTabel('tb_kategori', 'tabelKategori', this.value)"
        />
      </div>

      <!-- TABLE -->
      <div class="table-responsive">
        <table id="tabelKategori" data-source="tb_kategori">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- SCRIPT -->
    <script src="script.js"></script>
  </body>
</html>
